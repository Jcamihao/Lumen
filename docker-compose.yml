services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumen}
      POSTGRES_USER: ${POSTGRES_USER:-lumen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumen}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lumen} -d ${POSTGRES_DB:-lumen}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      APP_URL: ${APP_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lumen:lumen@postgres:5432/lumen?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-lumen_access_secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-lumen_refresh_secret}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      SELAH_ASSISTANT_ENABLED: ${SELAH_ASSISTANT_ENABLED:-false}
      SELAH_BASE_URL: ${SELAH_BASE_URL:-}
      SELAH_API_KEY: ${SELAH_API_KEY:-}
      SELAH_SOURCE_APP: ${SELAH_SOURCE_APP:-LumenBack}
      SELAH_ASSISTANT_ROUTE: ${SELAH_ASSISTANT_ROUTE:-/v1/adapters/lumen/life-assistant/chat}
      SELAH_TIMEOUT_MS: ${SELAH_TIMEOUT_MS:-3500}
    ports:
      - '${BACKEND_HOST_PORT:-3001}:3000'

  frontend:
    build:
      context: ./frontend
      args:
        FRONTEND_APP_API_BASE_URL: ${FRONTEND_APP_API_BASE_URL:-http://localhost:3001/api/v1}
        FRONTEND_APP_WS_BASE_URL: ${FRONTEND_APP_WS_BASE_URL:-http://localhost:3001}
        FRONTEND_APP_CLIENT_LOGGING_ENABLED: ${FRONTEND_APP_CLIENT_LOGGING_ENABLED:-true}
    depends_on:
      - backend
    environment:
      FRONTEND_APP_API_BASE_URL: ${FRONTEND_APP_API_BASE_URL:-http://localhost:3001/api/v1}
      FRONTEND_APP_WS_BASE_URL: ${FRONTEND_APP_WS_BASE_URL:-http://localhost:3001}
      FRONTEND_APP_CLIENT_LOGGING_ENABLED: ${FRONTEND_APP_CLIENT_LOGGING_ENABLED:-true}
    ports:
      - '${FRONTEND_HOST_PORT:-4201}:80'

volumes:
  postgres-data:
