<div class="workspace-shell">
  <aside class="workspace-shell__desktop-sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <div
    class="workspace-shell__mobile-menu"
    *ngIf="mobileSidebarOpen()"
    (click)="closeMobileSidebar()"
  >
    <div
      class="workspace-shell__mobile-menu-panel"
      (click)="$event.stopPropagation()"
    >
      <app-sidebar
        [mobile]="true"
        (closeRequested)="closeMobileSidebar()"
      ></app-sidebar>
    </div>
  </div>

  <main class="workspace-shell__content">
    <div class="workspace-shell__content-inner ambient-shell">
      <section
        *ngIf="showSyncBanner()"
        class="workspace-shell__sync-banner"
        [class.workspace-shell__sync-banner--warning]="syncBannerTone() === 'warning'"
        [class.workspace-shell__sync-banner--offline]="syncBannerTone() === 'offline'"
      >
        <div class="workspace-shell__sync-copy">
          <strong>{{ syncBannerTitle() }}</strong>
          <p>{{ syncBannerMessage() }}</p>
        </div>

        <button
          *ngIf="failedSyncCount() > 0"
          type="button"
          class="workspace-shell__sync-action"
          (click)="retryFailedSync()"
        >
          Tentar de novo
        </button>
      </section>

      <div
        class="workspace-shell__page-stage"
        [class.workspace-shell__page-stage--a]="routeAnimationFlip()"
        [class.workspace-shell__page-stage--b]="!routeAnimationFlip()"
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>

  <app-bottom-nav
    [menuOpen]="mobileSidebarOpen()"
    (menuRequested)="openMobileSidebar()"
    (navigationRequested)="handleBottomNavNavigation()"
  ></app-bottom-nav>
</div>
