<aside class="proto-sidebar" [class.proto-sidebar--mobile]="mobile">
  <div class="proto-sidebar__top">
    <a class="proto-sidebar__brand" routerLink="/dashboard" (click)="requestClose()">
      <img
        class="proto-sidebar__brand-logo"
        src="assets/logo/logo_lumen_s_fundo.png"
        alt="Logo do Lumen"
      />
      <span class="proto-sidebar__brand-copy">
        <span>Clareza para sua vida</span>
      </span>
    </a>

    <button
      *ngIf="mobile"
      type="button"
      class="proto-sidebar__close"
      aria-label="Fechar menu"
      (click)="requestClose()"
    >
      <span class="material-symbols-rounded">close</span>
    </button>
  </div>

  <div class="proto-sidebar__nav-block">
    <p class="section-kicker proto-sidebar__kicker">Menu principal</p>

    <nav class="proto-sidebar__nav">
      <a
        *ngFor="let item of navItems"
        class="proto-sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        (click)="requestClose()"
      >
        <span class="material-symbols-rounded">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </div>

  <div class="proto-sidebar__atelier">
    <span class="proto-sidebar__atelier-tag">Dica rápida</span>
    <strong>Comece pelo que precisa de atenção agora.</strong>
    <p>O resto pode esperar nas telas certas, sem lotar sua cabeça logo de entrada.</p>
  </div>

  <div class="proto-sidebar__profile">
    <button type="button" class="proto-sidebar__logout" (click)="logout()">
      <span class="material-symbols-rounded">logout</span>
      <span>Sair</span>
    </button>
  </div>
</aside>
